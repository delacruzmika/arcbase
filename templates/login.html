<!DOCTYPE html>
<html lang="en" class="antialiased">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ArcBASE — Log In</title>
        <link rel="icon" type="image/png" href="/static/photos/logo.png">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/client.css">
    </head>
    <body class="bg-slate-50 text-slate-900 min-h-screen">
        <!-- LOGIN -->
        <div id="login-screen" class="fixed inset-0 z-[100] bg-white flex items-start justify-center p-4 pt-20 overflow-y-auto">
            <div class="w-full max-w-sm space-y-8 fade-in text-center">
                <div class="space-y-2">
                    <img src="/static/photos/logo.png" class="w-16 h-16 mx-auto mb-4" alt="Logo">
                    <h2 class="text-3xl font-bold tracking-tight text-slate-900">Sign in to ArcBASE</h2>
                    <p class="text-sm text-slate-500">ArcBASE: ArcVis Blueprint & Architectural Service Engine</p>
                </div>
            </div>
        </div>

        <form method="POST" action="/login" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-semibold text-slate-700 mb-1 uppercase tracking-wider">Username</label>
                <input type="text" name="username" id="login-email" placeholder="Username" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#00A3B4]/20 focus:border-[#00A3B4] transition-all outline-none">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-700 mb-1 uppercase tracking-wider">Password</label>
                <input type="password" name="password" id="login-pass" placeholder="Password" class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#00A3B4]/20 focus:border-[#00A3B4] transition-all outline-none">
            </div>

            <div class="flex items-center justify-between text-xs">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="rounded text-[#00A3B4] focus:ring-[#00A3B4]">
                    <span class="text-slate-500">Remember me</span>
                </label>
                <a href="#" class="font-medium text-[#00A3B4] hover:text-[#003049]">Forgot password?</a>
            </div>

            <button type="submit" class="w-full py-3.5 px-4 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-semibold shadow-lg shadow-slate-200 transition-all active:scale-[0.98]">Sign in</button>
            
            {% if error %}
            <div class="flex items-center gap-3 bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl mt-4 fade-in">
                <iconify-icon icon="solar:danger-circle-bold" width="20" class="shrink-0"></iconify-icon>
                <p class="text-xs font-semibold">{{ error }}</p>
            </div>
            {% endif %}
        </form>
        <p class="text-sm text-slate-500">
            Don't have an account? <a href="/register" class="font-semibold text-[#00A3B4] hover:underline">Register</a>
        </p>

        <div class="relative py-4">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
            <div class="relative flex justify-center text-[10px] uppercase tracking-widest text-slate-400"><span class="px-2 bg-white">Security</span></div>
        </div>
        <div class="flex justify-center gap-4 text-xs text-slate-400">
            <span class="flex items-center gap-1"><iconify-icon icon="solar:shield-check-bold"></iconify-icon> 2FA Enabled</span>
            <span class="flex items-center gap-1"><iconify-icon icon="solar:lock-password-bold"></iconify-icon> Encrypted</span>
        </div>
    </div>
</div>
    </body>
</html>
