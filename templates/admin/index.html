<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcBASE — Admin Portal</title>
    <link rel="icon" type="image/png" href="/static/photos/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/client.css">
</head>
<body>

<!-- LOADING SCREEN   -->
<div id="loading-screen" class="fixed inset-0 z-[999] flex flex-col items-center justify-center" style="background:#003049">
    <div class="flex flex-col items-center gap-6 fade-in">
        <img src="/static/photos/logo.png" class="w-20 h-20" style="filter:brightness(0) invert(1)" alt="ARCBASE">
        <p class="text-white font-bold text-xl tracking-widest">ARCBASE</p>
        <div class="flex gap-2 mt-2">
            <div class="w-2 h-2 rounded-full bg-[#00A3B4] animate-bounce" style="animation-delay:0ms"></div>
            <div class="w-2 h-2 rounded-full bg-[#F4A820] animate-bounce" style="animation-delay:150ms"></div>
            <div class="w-2 h-2 rounded-full bg-[#00A3B4] animate-bounce" style="animation-delay:300ms"></div>
        </div>
    </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="main-dashboard" style="display:flex;" class="h-screen overflow-hidden flex">

    <!-- SIDEBAR -->
    <aside id="main-sidebar" class="bg-white border-r border-slate-200 flex flex-col shrink-0 h-full">
        <div id="sidebar-logo" onclick="toggleSidebar()" title="Toggle sidebar"
             class="p-5 border-b border-slate-50 flex items-center gap-3 cursor-pointer hover:bg-slate-50 transition-all select-none group">
            <img src="/static/photos/logo.png" class="w-8 h-8 shrink-0 transition-transform group-hover:scale-110">
            <span id="sidebar-logo-text" class="font-bold tracking-tight text-lg sidebar-label">ARCBASE</span>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <p class="sidebar-section-label px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Overview</p>
            <button onclick="navigateTo('dashboard')" id="nav-dashboard" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[#00A3B4] bg-[#e6f7f9] text-sm font-medium transition-all">
                <iconify-icon icon="solar:widget-5-bold" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Dashboard</span>
            </button>
            <p class="sidebar-section-label px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-5 mb-2">Management</p>
            <button onclick="navigateTo('clients')" id="nav-clients" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:users-group-rounded-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Clients</span>
            </button>
            <button onclick="navigateTo('projects')" id="nav-projects" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:folder-with-files-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Projects</span>
            </button>
            <button onclick="navigateTo('deliverables')" id="nav-deliverables" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:eye-scan-linear" width="20" class="shrink-0"></iconify-icon>
                <span class="sidebar-label flex-1 text-left">Deliverable Review</span>
                <span class="notif-badge-span text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center sidebar-label" style="background:#F77F00">2</span>
            </button>
            <button onclick="navigateTo('revisions')" id="nav-revisions" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:pen-2-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Revisions</span>
            </button>
            <p class="sidebar-section-label px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-5 mb-2">Finance &amp; Files</p>
            <button onclick="navigateTo('invoices')" id="nav-invoices" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:card-linear" width="20" class="shrink-0"></iconify-icon>
                <span class="sidebar-label flex-1 text-left">Invoices &amp; Billing</span>
                <span class="notif-badge-span text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center sidebar-label" style="background:#16a34a">1</span>
            </button>
            <button onclick="navigateTo('bom')" id="nav-bom" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:clipboard-list-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Bill of Materials</span>
            </button>
            <button onclick="navigateTo('filevault')" id="nav-filevault" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:safe-square-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">File Vault</span>
            </button>
            <p class="sidebar-section-label px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-5 mb-2">User</p>
            <button onclick="navigateTo('users')" id="nav-users" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:user-id-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">User Accounts</span>
            </button>
            <button onclick="navigateTo('scheduling')" id="nav-scheduling" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:calendar-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Scheduling</span>
            </button>
            <p class="sidebar-section-label px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-5 mb-2">Communication</p>
            <button onclick="navigateTo('messages')" id="nav-messages" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:chat-line-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Messages</span>
            </button>
            <button onclick="navigateTo('notifications')" id="nav-notifications" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:bell-linear" width="20" class="shrink-0"></iconify-icon>
                <span class="sidebar-label flex-1 text-left">Notifications</span>
                <span id="notif-badge" class="notif-badge-span text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center" style="background:#F77F00">3</span>
            </button>
            <p class="sidebar-section-label px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-5 mb-2">Account</p>
            <button onclick="navigateTo('settings')" id="nav-settings" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:text-slate-800 hover:bg-slate-50 text-sm font-medium transition-all">
                <iconify-icon icon="solar:settings-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Settings</span>
            </button>
        </nav>
        <div class="p-4 border-t border-slate-100">
            <button onclick="window.location.href='/logout'" class="w-full flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-400 hover:text-red-500 transition-colors">
                <iconify-icon icon="solar:logout-2-linear" width="20" class="shrink-0"></iconify-icon><span class="sidebar-label">Sign Out</span>
            </button>
        </div>
    </aside>

    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- HEADER -->
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between shrink-0 gap-4">
            <div class="flex items-center gap-4">
                <button id="hamburger-btn" onclick="toggleSidebar()" style="display:none;" class="w-10 h-10 rounded-xl flex items-center justify-center text-slate-500 hover:bg-slate-100 transition-all">
                    <iconify-icon icon="solar:hamburger-menu-linear" width="22"></iconify-icon>
                </button>
                <div id="header-search" class="flex items-center bg-slate-100 rounded-full px-4 py-2 w-80">
                    <iconify-icon icon="solar:magnifer-linear" class="text-slate-400 mr-2 shrink-0" width="16"></iconify-icon>
                    <input type="text" placeholder="Search clients, projects, invoices..." class="bg-transparent border-none outline-none text-sm w-full"
                        onkeydown="if(event.key==='Enter')handleSearch(this.value)">
                </div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold px-3 py-1.5 rounded-full hidden sm:flex items-center gap-1.5" style="background:rgba(0,48,73,.08);color:#003049">
                    <iconify-icon icon="solar:shield-user-bold" width="12"></iconify-icon> Admin
                </span>
                <div class="relative" id="notif-dropdown-wrap">
                    <button onclick="toggleNotifDropdown()" class="w-10 h-10 rounded-full hover:bg-slate-50 flex items-center justify-center text-slate-500 relative transition-all">
                        <iconify-icon icon="solar:bell-linear" width="22"></iconify-icon>
                        <span id="notif-dot" class="absolute top-2 right-2 w-2.5 h-2.5 bg-[#F77F00] rounded-full border-2 border-white"></span>
                    </button>
                    <div id="notif-dropdown" class="hidden absolute right-0 top-14 w-96 bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden z-[200]" style="box-shadow:0 8px 40px rgba(0,48,73,.15)">
                        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
                            <p class="font-bold text-slate-800">Notifications</p>
                            <button onclick="markAllReadDropdown()" class="text-[11px] font-semibold text-[#00A3B4] hover:underline">Mark all read</button>
                        </div>
                        <div id="notif-dropdown-list" class="max-h-[400px] overflow-y-auto divide-y divide-slate-50"></div>
                        <div class="px-5 py-3 border-t border-slate-100 text-center">
                            <button onclick="navigateTo('notifications');document.getElementById('notif-dropdown').classList.add('hidden')" class="text-xs font-semibold text-[#00A3B4] hover:underline w-full py-1">View all notifications</button>
                        </div>
                    </div>
                </div>
                <div class="relative border-l pl-3 border-slate-200" id="profile-dropdown-wrap">
                    <button onclick="toggleProfileDropdown()" class="flex items-center gap-3 hover:opacity-80 transition-all">
                        <div class="text-right hidden sm:block">
                            <p class="text-sm font-bold text-slate-900 leading-none">{{ username }}</p>
                            <p class="text-[10px] font-bold mt-0.5 uppercase" style="color:#00A3B4">Administrator</p>
                        </div>
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed={{ username }}" class="w-9 h-9 rounded-full bg-slate-200 border border-slate-200 object-cover">
                    </button>
                    <div id="profile-dropdown" class="hidden absolute right-0 top-14 w-56 bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden z-[200]" style="box-shadow:0 8px 40px rgba(0,48,73,.15)">
                        <div class="flex items-center gap-3 px-5 py-4 border-b border-slate-100">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed={{ username }}" class="w-10 h-10 rounded-full bg-slate-100 object-cover border border-slate-100 shrink-0">
                            <div><p class="text-sm font-bold text-slate-900">{{ username }}</p><p class="text-[11px] font-semibold" style="color:#00A3B4">Administrator</p></div>
                        </div>
                        <div class="py-2">
                            <button onclick="toggleProfileDropdown();navigateTo('settings')" class="w-full flex items-center gap-3 px-5 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50 text-left">
                                <iconify-icon icon="solar:settings-linear" width="16" class="text-slate-400 shrink-0"></iconify-icon> Settings
                            </button>
                        </div>
                        <div class="py-2 border-t border-slate-100">
                            <button onclick="window.location.href='/logout'" class="w-full flex items-center gap-3 px-5 py-3 text-sm font-medium text-red-500 hover:bg-red-50 text-left">
                                <iconify-icon icon="solar:logout-2-linear" width="16" class="shrink-0"></iconify-icon> Sign Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- PAGES -->
        <div class="flex-1 overflow-y-auto relative">
            <div id="page-dashboard"     class="min-h-full"></div>
            <div id="page-clients"       class="min-h-full hidden"></div>
            <div id="page-projects"      class="min-h-full hidden"></div>
            <div id="page-deliverables"  class="min-h-full hidden"></div>
            <div id="page-revisions"     class="min-h-full hidden"></div>
            <div id="page-invoices"      class="min-h-full hidden"></div>
            <div id="page-users"         class="min-h-full hidden"></div>
            <div id="page-scheduling"    class="min-h-full hidden"></div>
            <div id="page-bom"           class="min-h-full hidden"></div>
            <div id="page-filevault"     class="min-h-full hidden"></div>
            <div id="page-messages"      class="hidden" style="height:calc(100vh - 64px)"></div>
            <div id="page-notifications" class="min-h-full hidden"></div>
            <div id="page-settings"      class="hidden" style="height:calc(100vh - 64px)"></div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-[1000] bg-[#003049] text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3"></div>

<!-- SCRIPTS — order matters -->
<script src="/static/js/admin/data.js"></script>
<script src="/static/js/admin/auth.js"></script>
<script src="/static/js/admin/navigation.js"></script>
<script src="/static/js/admin/dashboard.js"></script>
<script src="/static/js/admin/clients.js"></script>
<script src="/static/js/admin/projects.js"></script>
<script src="/static/js/admin/deliverables.js"></script>
<script src="/static/js/admin/invoices.js"></script>
<script src="/static/js/admin/users.js"></script>
<script src="/static/js/admin/scheduling.js"></script>
<script src="/static/js/admin/bom.js"></script>
<script src="/static/js/admin/misc.js"></script>

<!-- ═══ HEADER DROPDOWNS ════════════════════════════════════════════════════ -->
<script>
/* ── Notification Dropdown ─────────────────────────────────────────────────── */

function closeNotifDropdown() {
    document.getElementById('notif-dropdown').classList.add('hidden');
}

function markReadDropdown(id) {
    if (typeof notificationsData === 'undefined') return;
    const n = notificationsData.find(n => n.id === id);
    if (n) n.unread = false;
    renderNotifDropdown();
}

function markAllReadDropdown() {
    if (typeof notificationsData !== 'undefined') {
        notificationsData.forEach(n => n.unread = false);
    }
    renderNotifDropdown();
    showToastMsg('All notifications marked as read.');
}

function loadMoreNotifsDropdown() {
    closeNotifDropdown();
    navigateTo('notifications');
}

/* ── Profile Dropdown ──────────────────────────────────────────────────────── */
function toggleProfileDropdown() {
    const dd = document.getElementById('profile-dropdown');
    const isOpen = !dd.classList.contains('hidden');
    closeAllDropdowns();
    if (!isOpen) dd.classList.remove('hidden');
}

function closeProfileDropdown() {
    document.getElementById('profile-dropdown').classList.add('hidden');
}

function closeAllDropdowns() {
    document.getElementById('notif-dropdown').classList.add('hidden');
    document.getElementById('profile-dropdown').classList.add('hidden');
}

/* ── Close on outside click ────────────────────────────────────────────────── */
document.addEventListener('click', e => {
    if (!document.getElementById('notif-dropdown-wrap').contains(e.target)) {
        closeNotifDropdown();
    }
    if (!document.getElementById('profile-dropdown-wrap').contains(e.target)) {
        closeProfileDropdown();
    }
});
</script>

<script>
        function handleLogout() {
            window.location.href = '/login';
        }
        
        // You might also want to include your toggle functions here
        function toggleProfileDropdown() {
            const dropdown = document.getElementById('profile-dropdown');
            dropdown.classList.toggle('hidden');
        }
        
        function closeProfileDropdown() {
            document.getElementById('profile-dropdown').classList.add('hidden');
        }
    </script>

    <script>
    // This triggers the initial view as soon as the scripts are ready
    window.addEventListener('DOMContentLoaded', () => {
        if (typeof navigateTo === 'function') {
            navigateTo('dashboard');
        }
    });
    </script>

</body>
</html>
