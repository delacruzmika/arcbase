<!DOCTYPE html>
<html lang="en" class="antialiased">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ArcBASE — Create Account</title>
        <link rel="icon" type="image/png" href="/static/photos/logo.png">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/client.css">
        <style>
            .role-card {
                cursor: pointer;
                border: 2px solid #e2e8f0;
                border-radius: 16px;
                padding: 1.1rem 1rem;
                transition: border-color .2s, background .2s, box-shadow .2s;
                background: white;
                display: flex;
                align-items: center;
                gap: 0.85rem;
                user-select: none;
            }
            .role-card:hover {
                border-color: #b2e8ed;
                background: #f8feff;
            }
            .role-card.selected {
                border-color: #00A3B4;
                background: rgba(0,163,180,.06);
                box-shadow: 0 0 0 3px rgba(0,163,180,.1);
            }
            .role-card .role-dot {
                width: 18px; height: 18px;
                border-radius: 50%;
                border: 2px solid #cbd5e1;
                flex-shrink: 0;
                display: flex; align-items: center; justify-content: center;
                transition: border-color .2s, background .2s;
            }
            .role-card.selected .role-dot {
                border-color: #00A3B4;
                background: #00A3B4;
            }
            .role-card.selected .role-dot::after {
                content: '';
                width: 6px; height: 6px;
                background: white;
                border-radius: 50%;
            }
            .role-icon-wrap {
                width: 40px; height: 40px;
                border-radius: 12px;
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0;
            }
        </style>
    </head>
    <body class="bg-slate-50 text-slate-900 min-h-screen">

        <div id="login-screen" class="fixed inset-0 z-[100] bg-white overflow-y-auto flex justify-center p-4">
            <div class="w-full max-w-md space-y-7 fade-in text-center my-auto py-8">

                <!-- Logo & title -->
                <div class="space-y-2">
                    <img src="/static/photos/logo.png" class="w-16 h-16 mx-auto mb-4" alt="Logo">
                    <h2 class="text-3xl font-bold tracking-tight text-slate-900">Create an Account</h2>
                    <p class="text-sm text-slate-500">ArcBASE: ArcVis Blueprint & Architectural Service Engine</p>
                </div>

                <form method="POST" action="/register" class="space-y-5 text-left" id="register-form">

                    <!-- ── ROLE SELECTOR ── -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-2 uppercase tracking-wider">I am a...</label>
                        <div class="grid grid-cols-2 gap-3">

                            <!-- Client card -->
                            <div class="role-card selected" id="card-client" onclick="selectRole('client')">
                                <div class="role-icon-wrap" style="background:#e6f7f9">
                                    <iconify-icon icon="solar:user-bold" style="color:#00A3B4" width="20"></iconify-icon>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-bold text-slate-800">Client</p>
                                    <p class="text-[10px] text-slate-400 leading-tight mt-0.5">View projects & invoices</p>
                                </div>
                                <div class="role-dot"></div>
                            </div>

                            <!-- Admin card -->
                            <div class="role-card" id="card-admin" onclick="selectRole('admin')">
                                <div class="role-icon-wrap" style="background:rgba(0,48,73,.08)">
                                    <iconify-icon icon="solar:shield-user-bold" style="color:#003049" width="20"></iconify-icon>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-bold text-slate-800">Admin</p>
                                    <p class="text-[10px] text-slate-400 leading-tight mt-0.5">Manage the firm</p>
                                </div>
                                <div class="role-dot"></div>
                            </div>

                        </div>
                        <!-- Hidden input that carries the role value to Flask -->
                        <input type="hidden" name="role" id="role-input" value="client">
                    </div>

                    <!-- Name -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-1 uppercase tracking-wider">Full Name</label>
                        <input type="text" name="username" id="login-name" placeholder="Full Name"
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#00A3B4]/20 focus:border-[#00A3B4] transition-all outline-none">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-1 uppercase tracking-wider">Email</label>
                        <input type="email" name="email" id="login-email" placeholder="Email"
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#00A3B4]/20 focus:border-[#00A3B4] transition-all outline-none">
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-1 uppercase tracking-wider">Password</label>
                        <input type="password" name="password" id="login-pass" placeholder="At least 6 characters"
                            class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-[#00A3B4]/20 focus:border-[#00A3B4] transition-all outline-none">
                    </div>

                    <!-- Submit -->
                    <button type="submit"
                        class="w-full py-3.5 px-4 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-semibold shadow-lg shadow-slate-200 transition-all active:scale-[0.98]">
                        Create Account
                    </button>

                </form>

                <!-- Flash message -->
                {% if message %}
                    {% if status == "success" %}
                        <div class="flex items-center gap-3 bg-emerald-50 border border-emerald-100 text-emerald-600 px-4 py-3 rounded-xl fade-in">
                            <iconify-icon icon="solar:check-circle-bold" width="20" class="shrink-0"></iconify-icon>
                            <p class="text-xs font-semibold">{{ message }}</p>
                        </div>
                    {% else %}
                        <div class="flex items-center gap-3 bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl fade-in">
                            <iconify-icon icon="solar:danger-circle-bold" width="20" class="shrink-0"></iconify-icon>
                            <p class="text-xs font-semibold">{{ message }}</p>
                        </div>
                    {% endif %}
                {% endif %}

                <p class="text-sm text-slate-500">
                    Already have an account?
                    <a href="/login" class="font-semibold text-[#00A3B4] hover:underline">Log In</a>
                </p>

            </div>
        </div>

        <script>
            function selectRole(role) {
                // Update hidden input
                document.getElementById('role-input').value = role;

                // Update card visual states
                document.getElementById('card-client').classList.toggle('selected', role === 'client');
                document.getElementById('card-admin').classList.toggle('selected', role === 'admin');
            }
        </script>

    </body>
</html>
